# Example: LiveKit-based voice agent (Phase 1 — data messages)
#
# This provider connects to a LiveKit room and communicates via the
# data channel (text messages). No audio is used.
#
# Your agent must listen on data_topic and respond in the same format:
#   Incoming: {"role": "user",      "content": "<caller turn>"}
#   Outgoing: {"role": "assistant", "content": "<agent reply>"}
#
# The agent must be configured to auto-join rooms matching room_prefix
# (via LiveKit Dispatch / webhook). See the livekit-agents SDK docs.

provider: livekit

assistant:
  id: "your-agent-id"
  name: "My LiveKit Agent"
  description: |
    Voice agent for [describe your agent here].
    Replace this with your actual agent's capabilities, services,
    pricing, policies, and constraints. The more detail you provide,
    the sharper the adversarial test scenarios will be.

livekit:
  url: "wss://your-project.livekit.cloud"
  room_prefix: "eval"           # Room names: eval-<uuid>
  data_topic: "text"            # Data channel topic your agent listens on
  response_timeout: 30          # Seconds to wait for each response
  agent_join_timeout: 30        # Seconds to wait for agent to join room
  agent_backend: "none"         # "smallest" to delegate prompt management
                                # to Smallest AI, "none" to manage externally

autoresearch:
  eval_scenarios: 6
  max_experiments: 20

scoring:
  should_weight: 0.50
  should_not_weight: 0.35
  latency_weight: 0.15
